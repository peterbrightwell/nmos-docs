[project]
site_name = "AMWA NMOS"
site_description = "Documentation for the AMWA Networked Media Open Specifications (NMOS)"
site_author = "Advanced Media Workflow Association (AMWA)"
copyright = "Copyright &copy; 2026 Advanced Media Workflow Association\n"

[project.theme]
language = "en"
features = [ "announce.dismiss", "content.code.annotate", "content.code.copy", "content.code.select", "content.footnote.tooltips", "content.tabs.link", "content.tooltips", "navigation.footer", "navigation.indexes", "navigation.instant", "navigation.instant.prefetch", "navigation.path", "navigation.sections", "navigation.top", "navigation.tracking", "search.highlight",]
[[project.theme.palette]]
scheme = "default"

[project.theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to dark mode"
[[project.theme.palette]]
scheme = "slate"

[project.theme.palette.toggle]
icon = "lucide/moon"
name = "Switch to light mode"
